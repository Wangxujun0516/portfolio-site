<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#F3F7FD"/>
  <rect x="56" y="48" width="1488" height="804" rx="28" fill="#FFFFFF" stroke="#D8E3F0"/>
  <rect x="96" y="96" width="420" height="34" rx="10" fill="#E8F0FE"/>
  <rect x="96" y="150" width="1120" height="22" rx="8" fill="#DDE7F5"/>
  <rect x="96" y="188" width="1040" height="22" rx="8" fill="#E8EEF8"/>
  <rect x="96" y="244" width="312" height="310" rx="20" fill="#F8FBFF" stroke="#D8E3F0"/>
  <rect x="432" y="244" width="1040" height="310" rx="20" fill="#0B1220"/>
  <rect x="96" y="586" width="1376" height="210" rx="20" fill="#F8FBFF" stroke="#D8E3F0"/>
  <text x="116" y="122" fill="#2563EB" font-family="Arial, sans-serif" font-size="24" font-weight="700">API Quick Start Sample</text>
  <text x="116" y="282" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Before you begin</text>
  <text x="116" y="330" fill="#475569" font-family="Arial, sans-serif" font-size="20">• Create an account and generate an API key</text>
  <text x="116" y="370" fill="#475569" font-family="Arial, sans-serif" font-size="20">• Install curl or use your preferred HTTP client</text>
  <text x="116" y="410" fill="#475569" font-family="Arial, sans-serif" font-size="20">• Follow one shortest path to first success</text>
  <text x="460" y="282" fill="#93C5FD" font-family="Courier New, monospace" font-size="22">curl -X POST https://api.example.dev/v1/generate</text>
  <text x="460" y="320" fill="#E2E8F0" font-family="Courier New, monospace" font-size="20">-H "Authorization: Bearer YOUR_API_KEY"</text>
  <text x="460" y="358" fill="#E2E8F0" font-family="Courier New, monospace" font-size="20">-H "Content-Type: application/json"</text>
  <text x="460" y="396" fill="#E2E8F0" font-family="Courier New, monospace" font-size="20">-d '{ "model": "writer-lite", "prompt": "Write a welcome message" }'</text>
  <text x="460" y="474" fill="#34D399" font-family="Courier New, monospace" font-size="20">{ "output": "Welcome! We are glad you're here." }</text>
  <text x="116" y="628" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Why this works</text>
  <text x="116" y="676" fill="#475569" font-family="Arial, sans-serif" font-size="20">Narrow task scope, realistic example payload, and a visible success response.</text>
  <text x="116" y="714" fill="#475569" font-family="Arial, sans-serif" font-size="20">This format shows how I guide developers from hesitation to completion quickly.</text>
</svg>